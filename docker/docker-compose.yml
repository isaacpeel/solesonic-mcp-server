services:
  solesonic-mcp-redis:
    env_file:
      - .env
    image: redis:8.8.0
    container_name: solesonic-mcp-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
      --appendonly yes
    restart: unless-stopped
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "6380:6379"
    volumes:
      - solesonic-mcp-redis:/data
    networks:
      - solesonic-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  solesonic-mcp-server:
    env_file:
      - ${ENV_FILE:-.env}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      no_cache: true
    container_name: solesonic-mcp-server
    ports:
      - "8181:8080"
    environment:
      - SERVER_PORT=8181
      - REDIS_HOST=solesonic-mcp-redis
    volumes:
      - /var/log/solesonic-mcp-server:/var/log/solesonic-mcp-server
    restart: unless-stopped
    depends_on:
      - solesonic-mcp-redis
    networks:
      - solesonic-network

networks:
  solesonic-network:
    driver: bridge
    name: solesonic-network
    external: true

volumes:
  solesonic-mcp-redis:
