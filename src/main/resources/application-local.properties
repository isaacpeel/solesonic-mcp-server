management.endpoints.access.default=unrestricted
solesonic.mcp.resource=${MCP_REGISTRATION_ENDPOINT}

logging.level.root=INFO
logging.level.com.solesonic.mcp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.io.a2a=DEBUG

spring.ai.mcp.server.request-timeout=600s

# A2A Sports Agent — disable auth for local development
solesonic.sports-agent.security.enabled=false
solesonic.sports-agent.url=http://127.0.0.1:9443
