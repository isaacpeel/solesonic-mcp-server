management.endpoints.access.default=unrestricted
solesonic.mcp.resource=${MCP_REGISTRATION_ENDPOINT}

management.endpoint.env.show-values=always
management.endpoint.configprops.show-values=always

logging.level.root=INFO
logging.level.com.solesonic.mcp=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web.cors=INFO
logging.level.org.springframework.web.servlet=INFO
logging.level.io.a2a=DEBUG
logging.level.com.solesonic.mcp.security.MpcSecurityConfig=INFO

spring.ai.mcp.server.request-timeout=600s

# A2A Sports Agent — disable auth for local development
solesonic.agent.security.enabled=false
