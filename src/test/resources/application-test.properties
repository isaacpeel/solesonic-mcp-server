spring.application.name=solesonic-mcp-server

server.port=9443

spring.ai.mcp.server.name=solesonic-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=sync
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.prompt=true
spring.ai.mcp.server.capabilities.completion=true
spring.ai.mcp.server.capabilities.resource=true

# Test environment variables for OAuth2/JWT configuration
ISSUER_URI=https://test-issuer.example.com
JWK_SET_URI=https://test-issuer.example.com/.well-known/jwks.json
JIRA_URL_TEMPLATE=https://test.atlassian.net
JIRA_CLOUD_ID_PATH=/test
ATLASSIAN_TOKEN_BROKER_URL=https://test-token-broker.example.com
ATLASSIAN_TOKEN_BROKER_ISSUER_URI=https://test-token-broker.example.com/oauth/token
ATLASSIAN_TOKEN_BROKER_CLIENT_ID=test-client-id
ATLASSIAN_TOKEN_BROKER_CLIENT_SECRET=test-client-secret
CORS_ALLOWED_ORIGINS=http://localhost

solesonic.mcp.resource=test-resource-value
solesonic.a2a.base.uri=http://localhost:8080

# Tavily Test Configuration
tavily.api.uri=https://api.tavily.com
tavily.api.key=test-tavily-api-key


spring.ai.chat.memory.redis.host=test-host
spring.ai.chat.memory.redis.port=1234
spring.ai.chat.memory.redis.time-to-live=24h
spring.ai.chat.memory.redis.initialize-schema=true
spring.ai.chat.memory.redis.key-prefix=solesonic:chat:memory:
spring.ai.chat.memory.redis.index-name=solesonic-chat-memory-idx